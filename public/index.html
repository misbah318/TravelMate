<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- WEBSITE TITLE -->
    <title>TravelMate - Your Journey Begins</title>

    <!-- WEBSITE DESCRIPTION -->
    <meta name="description"
        content="TravelMate helps travelers explore destinations, check weather forecasts, and estimate trip budgets.">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">

            <!-- LOGO -->
            <div class="logo">
                TravelMate
            </div>

            <!-- NAVIGATION LINKS -->
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Destinations</a></li>
                <li><a href="#">Packages</a></li>
                <li><a href="#">Weather</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <!-- LOGIN BUTTON -->
            <button class="login-btn">
                Login
            </button>

        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <div class="hero-content">

            <h1>Explore the world with Travelmate</h1>

            <p>
                Explore beautiful destinations, check weather forecasts,
                and plan your journey with TravelMate.
            </p>

            <button class="explore-btn">
                Explore Now
            </button>

        </div>

    </section>
    <!-- DESTINATIONS SECTION -->
<section class="destinations">

    <h2 class="section-title">Popular Destinations</h2>

    <div class="destination-grid">

        <div class="destination-card" onclick="showCountry('india')">
            <img src="images/india.jpg" alt="India">
            <h3>India</h3>
        </div>

        <div class="destination-card" onclick="showCountry('japan')">
            <img src="images/japan.jpg" alt="Japan">
            <h3>Japan</h3>
        </div>

        <div class="destination-card" onclick="showCountry('france')">
            <img src="images/france.jpg" alt="France">
            <h3>France</h3>
        </div>

        <div class="destination-card" onclick="showCountry('uae')">
            <img src="images/uae.jpg" alt="UAE">
            <h3>UAE</h3>
        </div>

        <div class="destination-card" onclick="showCountry('switzerland')">
            <img src="images/switzerland.jpg" alt="Switzerland">
            <h3>Switzerland</h3>
        </div>

        <div class="destination-card" onclick="showCountry('maldives')">
            <img src="images/maldives.jpg" alt="Maldives">
            <h3>Maldives</h3>
        </div>

    </div>

</section>
<!-- COUNTRY MODAL -->

<div id="countryModal" class="modal">

    <div class="modal-content">

        <span class="close-btn" onclick="closeModal()">
            &times;
        </span>

        <h2 id="countryTitle"></h2>

        <ul id="cityList"></ul>

    </div>

</div>

    <script src="script.js"></script>

</body>

</html>
